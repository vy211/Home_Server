version: "3"

services:

  postgres:
    image: postgres:16
    container_name: postgres16
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis7
    restart: always
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma
    container_name: chroma
    restart: always
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  chroma_data:
  ollama_data: